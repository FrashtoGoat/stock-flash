# Stock Flash 全局配置

# 自研池（与新闻驱动并列的另一条路线：从独立文件列表出发跑链式筛选，不入新闻池，通知/交易会标明来源「自研池」）
research_pool:
  enabled: true
  file: "research_pool.yaml"   # 标的列表放在 config/research_pool.yaml，此处只开关与文件名

# 新闻源配置
news:
  jin10:
    enabled: false              # 金十免费API已于2025.12停服
    api_url: "https://flash-api.jin10.com/get"
    max_items: 20
    categories: ["stock", "macro"]
  sina:
    enabled: true
    max_items: 20
    zhibo_id: 152               # 新浪财经7x24直播间ID
  eastmoney:
    enabled: true
    max_items: 20

# LLM 大模型配置
llm:
  active_provider: "bailian"   # bailian / zhipu — 切换只需改这里
  temperature: 0.3
  max_tokens: 4000
  providers:
    bailian:
      api_key: "${BAILIAN_API_KEY}"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "qwen-plus"
    zhipu:
      api_key: "${ZHIPU_API_KEY}"
      # 默认官方 API；自部署时在 .env 设置 ZHIPU_BASE_URL 覆盖
      base_url: "${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4/}"
      model: "glm-4-flash"

# 筛选器链配置 (执行顺序: board → affordability → anomaly → master → institution → technical)
filters:
  board_filter:
    enabled: true
    allowed_boards: ["main"]
  affordability_filter:
    enabled: true
    max_price: 100
    allowed_boards: ["main"]
  anomaly_filter:
    enabled: true
    conditions:
      max_5d_change_pct: 25.0       # 5日涨幅上限，超过可能见顶
      min_5d_change_pct: -15.0      # 5日跌幅下限，超过可能接飞刀
      max_1d_change_pct: 9.5        # 当日涨幅上限
      min_1d_change_pct: -7.0       # 当日跌幅下限
      min_up_days_in_5: 2           # 近5日至少N天收阳
  master_filter:
    enabled: true
    thresholds:
      pe_max: 40
      pb_max: 6
      roe_min: 8
      debt_ratio_max: 70
      revenue_growth_min: 5
      market_cap_min_yi: 50
  institution_filter:
    enabled: true
    min_institutions: 1             # 十大流通股东中至少N个机构
    require_margin_up: false        # 是否要求融资余额上升
  technical_filter:
    enabled: true
    conditions:
      volume_ratio_min: 0.8
      volume_ratio_max: 5.0
      turnover_rate_min: 1.0
      turnover_rate_max: 15.0
      profit_ratio_min: 30.0
      ma_trend: "bullish"
      require_above_ma20: true
      macd_mode: "positive"

# 大盘判断配置
market:
  index_code: "sh000001"
  max_decline_pct: -2.0
  reference_indices:
    - "sh000001"
    - "sz399001"
    - "sz399006"

# 股票池（观察/稳定/高位/移除），需 storage.enabled
stock_pool:
  enabled: false
  stable_watch_hours: 24
  watch_max_hours: 72
  stable_min_1d_pct: -3.0
  stable_max_1d_pct: 5.0
  stable_min_5d_pct: -10.0
  stable_max_5d_pct: 20.0
  high_threshold_5d_pct: 15.0
  remove_stable_when_news_expired: true
  allow_high_to_stable: false

# 存储配置（数据库，用于交易记录 / 止盈止损 / 回测 / 新闻库）
storage:
  enabled: true
  news_expire_hours: 24   # 新闻超过该小时数标为 expired，不再参与实时交易
  database:
    url: ""   # 空则默认 data/stock_flash.db（SQLite）

# 交易配置（mode: simulated 仅落库 | paper 模拟盘 | ctp OpenCTP仿真 | live 实盘暂未实现）
trading:
  mode: "simulated"   # simulated / paper / ctp(OpenCTP仿真) / live
  broker: "eastmoney"
  max_position_pct: 10
  max_total_positions: 5
  default_amount: 10000
  # 买入金额：按评分缩放，不低于 min_buy_amount（覆盖手续费+滑点后不亏）
  # 公式：金额 = clamp(default_amount * (0.5+0.5*score/100), min_buy_amount, max_amount_per_trade)，不 all-in
  min_buy_amount: 3500      # 约 2*5 元佣金 + 0.2% 滑点，需约 0.5% 波动覆盖，故不低于约 3500
  max_amount_per_trade: 50000  # 单笔上限，避免 all-in
  score_based_amount: true  # true 时按评分缩放金额
  # 回测用：初始资金分两份，每条路线一份（回测时按 source 分账）
  initial_capital: 100000
  capital_ratio_news: 0.5
  capital_ratio_research_pool: 0.5
  # 止盈止损（持仓检查时使用）
  stop_profit_pct: 0.10    # 单票盈利达到 10% 止盈
  stop_loss_pct: -0.05     # 单票亏损达到 5% 止损
  hold_days_min: 1         # 最短持仓天数，避免当日买卖
  # OpenCTP 仿真/7x24（mode=ctp 时使用）；敏感信息建议用环境变量：${OPENCTP_USER}、${OPENCTP_PASSWORD}
  ctp:
    enabled: true
    user_id: "17572"        # 7x24 账号（全天可测）；仿真可用 16988
    password: "123456"
    broker_id: "9999"
    td_url: "tcp://trading.openctp.cn:30001"   # 7x24；仿真用 tcp://trading.openctp.cn:30002
    app_id: ""
    auth_code: ""

# 通知配置
notification:
  # 邮箱通知：发件人显示名「量化小龙虾」，收件人见 receivers；密码用 QQ 邮箱授权码填 .env
  email:
    enabled: true
    smtp_server: "smtp.qq.com"
    smtp_port: 465
    sender: "${EMAIL_SENDER}"
    sender_name: "量化小龙虾"
    password: "${EMAIL_PASSWORD}"
    receivers:
      - "1271573554@qq.com"
  # 企业微信群机器人：群设置 -> 添加群机器人 -> 复制 webhook 地址即可，不麻烦
  wechat:
    enabled: false
    webhook_url: ""   # 例: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx
  # PushPlus 已关闭，改用邮箱通知
  pushplus:
    enabled: false
    token: "${PUSHPLUS_TOKEN:}"

# 定时器配置
# 定时调度：默认双路线（新闻+自研池）每天 8:00-01:00 每小时一次
scheduler:
  enabled: true
  jobs:
    - name: "both_routes"
      cron: "0 0,1,8-23 * * *"
      run_both: true

# 日志配置
logging:
  level: "INFO"
  file: "logs/stock-flash.log"
  max_size_mb: 10
  backup_count: 5
